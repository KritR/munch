version: 2

project_name: munch

before:
  hooks:
    - go mod tidy

builds:
  - id: munch
    main: ./cmd/munch
    binary: munch
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/krithikr/munch/internal/command.Version={{ .Version }}

archives:
  - id: default
    ids:
      - munch
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: KritR
    name: munch
